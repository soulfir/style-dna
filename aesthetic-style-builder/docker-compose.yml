services:
  app:
    build: .
    ports:
      - "8080:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - ./output:/app/output
      - ./uploads:/app/uploads
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/styles')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
